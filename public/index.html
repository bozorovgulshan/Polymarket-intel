<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Polymarket Intel</title>
<link rel="stylesheet" href="/style.css" />
</head>
<body>
<div id="app">
  <header>
    <div class="logo">POLYMARKET <span>INTEL</span></div>
    <div class="status"><span class="dot"></span> LIVE</div>
  </header>

  <div id="stats" class="stats"></div>

  <div id="loading" class="loading">
    <div class="spinner">SCANNING POLYMARKET</div>
  </div>

  <div id="error" class="error" style="display:none">
    <h2>Connection Error</h2>
    <p id="errorMsg"></p>
    <button onclick="load()">Retry</button>
  </div>

  <div id="content" style="display:none">
    <div class="table-header">
     <span>#</span><span>TRADER</span><span>PROFIT</span><span>VOLUME</span><span>X</span>
    </div>
    <div id="traders"></div>
  </div>
</div>
<script src="/app.js"></script>
</body>
</html>
